<!DOCTYPE html>

<title>RollAndShow</title>

<!-- MENU ARRIBA -->
<div style="

top:0;
left:0;
width:100%;
background:rgba(0,0,0,0.75);

text-align:center;
z-index:1000;
">

<b style="margin-right:14px; font-size:clamp(12px, 2.8vw, 18px);">
ROLLANDSHOW
</b>

<a href="#" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Home</a>
<a href="#" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Photos</a>
<a href="#" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Videos</a>
<a href="#links" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Social</a>
<a href="#" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Store</a>

</div>

<div style="

display:flex;
flex-direction:column;

text-align:center;
padding:90px 15px 40px 15px;
">

<h1 style="
font-size:clamp(34px, 8vw, 70px);
letter-spacing:4px;
margin-bottom:10px;
text-shadow:0 0 10px rgba(0,0,0,0.6);

ROLLANDSHOW
</h1>

<p style="
font-size:clamp(16px, 4vw, 22px);
margin:5px;
text-shadow:0 0 10px rgba(0,0,0,0.6);

IRL Streams
</p>

<p style="
font-size:clamp(14px, 3.5vw, 18px);
margin-bottom:25px;
text-shadow:0 0 10px rgba(0,0,0,0.6);
">
WalkingShelter Project
</p>

<button onclick="document.getElementById('links').scrollIntoView();" style="
padding:14px 24px;
font-size:clamp(14px, 3.2vw, 18px);
background:transparent;
color:white;
border:2px solid white;
cursor:pointer;

</button>

<div id="links" style="
padding:60px 15px;
text-align:center;

">

margin-bottom:20px;

CONNECT
</h2>

<div style="

gap:16px;
justify-content:center;

<a href="https://youtube.com/@rollandshow" target="_blank" style="
color:white;
text-decoration:none;
border:1px solid white;
padding:10px 18px;
font-size:clamp(13px, 3vw, 16px);

</a>

<a href="https://www.tiktok.com/@rollandsh0w" target="_blank" style="
