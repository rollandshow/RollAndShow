<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RollAndShow</title>

<style>
html {
  scroll-behavior: smooth;
}
</style>

</head>

<body style="
margin:0;
font-family:Arial, sans-serif;
color:white;
background-image:url('banner.png');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
">

<!-- MENU ARRIBA -->
<div style="
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,0.75);
padding:12px 0;
text-align:center;
z-index:1000;
">

<b style="margin-right:14px; font-size:clamp(12px, 2.8vw, 18px);">
ROLLANDSHOW
</b>

<a href="#" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Home</a>
<a href="#photos" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Photos</a>
<a href="#" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Videos</a>
<a href="#links" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Social</a>
<a href="#" style="color:white; margin:8px; text-decoration:none; font-size:clamp(12px, 2.5vw, 16px);">Store</a>

</div>

<!-- CONTENIDO CENTRAL -->
<div style="
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:90px 15px 40px 15px;
">

<h1 style="
font-size:clamp(34px, 8vw, 70px);
letter-spacing:4px;
margin-bottom:10px;
text-shadow:0 0 10px rgba(0,0,0,0.6);
">
ROLLANDSHOW
</h1>

<p style="
font-size:clamp(16px, 4vw, 22px);
margin:5px;
text-shadow:0 0 10px rgba(0,0,0,0.6);
">
IRL Streams
</p>

<p style="
font-size:clamp(14px, 3.5vw, 18px);
margin-bottom:25px;
text-shadow:0 0 10px rgba(0,0,0,0.6);
">
WalkingShelter Project
</p>

<button onclick="document.getElementById('links').scrollIntoView();" style="
padding:14px 24px;
font-size:clamp(14px, 3.2vw, 18px);
background:transparent;
color:white;
border:2px solid white;
cursor:pointer;
backdrop-filter: blur(5px);
">
EXPLORE JOURNEY
</button>

</div>

<!-- LINKS (SIN RECTÁNGULO NEGRO) -->
<div id="links" style="
padding:60px 15px;
text-align:center;
width:100%;
">

<h2 style="
margin-bottom:20px;
text-shadow:0 0 10px rgba(0,0,0,0.7);
">
CONNECT
</h2>

<div style="
display:flex;
gap:16px;
justify-content:center;
flex-wrap:wrap;
max-width:800px;
margin:auto;
">

<a href="https://youtube.com/@rollandshow" target="_blank"
color:white;
text-decoration:none;
border:1px solid white;
padding:10px 18px;
font-size:clamp(13px, 3vw, 16px);
backdrop-filter: blur(6px);
">
YouTube
</a>

<a href="https://www.tiktok.com/@rollandsh0w" target="_blank"
color:white;
text-decoration:none;
border:1px solid white;
padding:10px 18px;
font-size:clamp(13px, 3vw, 16px);
backdrop-filter: blur(6px);
">
TikTok
</a>
</div>

  </div>

  <!-- GALERIA DE FOTOS -->
  <div id="photos" style="
  padding:80px 20px;
  ">

    <h2 style="
    text-align:center;
    margin-bottom:30px;
    font-size:28px;
    letter-spacing:2px;
    text-shadow:0 0 10px rgba(0,0,0,0.7);
    ">
      PHOTOS
    </h2>

    <div style="
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:18px;
    max-width:1200px;
    margin:auto;
    ">

      <div style="overflow:hidden; border-radius:14px;">
        <img src="foto1.jpg" style="width:100%; height:320px; object-fit:cover; display:block;">
      </div>

      <div style="overflow:hidden; border-radius:14px;">
        <img src="foto2.jpg" style="width:100%; height:320px; object-fit:cover; display:block;">
      </div>

      <div style="overflow:hidden; border-radius:14px;">
        <img src="foto3.jpg" style="width:100%; height:320px; object-fit:cover; display:block;">
      </div>

      <div style="overflow:hidden; border-radius:14px;">
        <img src="foto4.jpg" style="width:100%; height:320px; object-fit:cover; display:block;">
      </div>

      <div style="overflow:hidden; border-radius:14px;">
        <img src="foto5.jpg" style="width:100%; height:320px; object-fit:cover; display:block;">
      </div>

      <div style="overflow:hidden; border-radius:14px;">
        <img src="foto6.jpg" style="width:100%; height:320px; object-fit:cover; display:block;">
      </div>

    </div>

  </div>
<div id="videos" style="padding:80px 20px; text-align:center;">

<h2 style="
margin-bottom:30px;
font-size:28px;
letter-spacing:2px;
text-shadow:0 0 10px rgba(0,0,0,0.7);
">
VIDEOS
</h2>

<iframe 
width="90%" 
height="500"
src="https://www.youtube.com/embed/N05yoK4NVsM"
frameborder="0"
allowfullscreen
style="border-radius:12px; max-width:400px;">
</iframe>

</div>
</body>
</html>
